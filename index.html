function t(key) { return I18N[currentLang][key]; }
function getCriteriaMap() { return I18N[currentLang].criteria; }

// ── 하트(좋아요) ──
const LIKES_KEY = 'springbreak_likes';
function getLikes() {
  try { return JSON.parse(localStorage.getItem(LIKES_KEY)) || {}; } catch { return {}; }
}
function toggleLike(id) {
  const likes = getLikes();
  likes[id] = !likes[id];
  localStorage.setItem(LIKES_KEY, JSON.stringify(likes));
  const btn = document.querySelector(`.heart-btn[data-id="${id}"]`);
  const icon = btn.querySelector('.heart-icon');
  const count = btn.querySelector('.heart-count');
  if (likes[id]) {
    icon.style.color = '#ef4444';
    icon.style.fill = '#ef4444';
    icon.style.transform = 'scale(1.3)';
    setTimeout(() => icon.style.transform = 'scale(1)', 200);
    count.textContent = '1';
    count.style.opacity = '1';
  } else {
    icon.style.color = 'rgba(255,255,255,0.7)';
    icon.style.fill = 'none';
    count.textContent = '';
    count.style.opacity = '0';
  }
}

// ── 거리 색상 ──
function distanceColor(miles) {
  if (miles <= 100) return 'text-emerald-400';
  if (miles <= 150) return 'text-white/50';
  return 'text-orange-400/80';
}

// ── 조건 매치 도트 색상 ──
function criteriaStyles(status) {
  return {
    yes:     { dot: 'bg-emerald-400', text: 'text-white/70' },
    partial: { dot: 'bg-amber-400/70', text: 'text-white/40' },
    no:      { dot: 'bg-white/[0.12]', text: 'text-white/20' }
  }[status];
}

// ── 카드 렌더링 ──
function renderCard(item) {
  const badge = item.recommendation
    ? `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-amber-400/[0.08] text-amber-300 text-[11px] font-medium tracking-wide">
         <i data-lucide="${item.recIcon}" class="w-3.5 h-3.5"></i>
         ${item.recommendation}
       </span>`
    : '';

  const cMap = getCriteriaMap();
  const criteriaHTML = Object.entries(item.criteria).map(([key, status]) => {
    const s = criteriaStyles(status);
    return `<span class="flex items-center gap-1.5">
      <span class="w-[5px] h-[5px] rounded-full ${s.dot}"></span>
      <span class="${s.text}">${cMap[key]}</span>
    </span>`;
  }).join('');

  const prosHTML = item.pros.map(p =>
    `<li class="flex items-start gap-2 text-white/60 text-[13px] leading-relaxed">
       <i data-lucide="check" class="w-3.5 h-3.5 mt-0.5 text-emerald-400/60 shrink-0"></i>${p}
     </li>`
  ).join('');

  const consHTML = item.cons.map(c =>
    `<li class="flex items-start gap-2 text-white/40 text-[13px] leading-relaxed">
       <i data-lucide="minus" class="w-3.5 h-3.5 mt-0.5 text-orange-400/50 shrink-0"></i>${c}
     </li>`
  ).join('');

  const amenityTags = item.amenities.map(a =>
    `<span class="px-2 py-0.5 rounded-full bg-white/[0.04] text-white/40 text-[11px]">${a}</span>`
  ).join('');

  const searchHTML = item.searchTerms.map(s =>
    `<li class="text-white/30 text-[11px]">${s}</li>`
  ).join('');

  const soldOutClass = item.soldOut ? 'opacity-50 grayscale' : '';

  return `
  <article class="card bg-[#111] border border-white/[0.06] rounded-[20px] overflow-hidden flex flex-col ${item.soldOut ? 'pointer-events-auto' : ''}">
    <div class="relative group">
      <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="block cursor-pointer">
        <div class="aspect-[3/2] overflow-hidden bg-[#0a0a0a]">
          <img src="${item.image}" alt="${item.name}" class="gallery-main-img w-full h-full object-cover transition-transform duration-300 ${item.soldOut ? 'grayscale opacity-40' : 'group-hover:scale-[1.03]'}" loading="lazy">
        </div>
        ${item.rank ? `<div class="absolute top-3 left-3 w-7 h-7 rounded-full ${item.rank === 1 ? 'bg-amber-400 text-black' : 'bg-white/20 text-white'} flex items-center justify-center text-[13px] font-bold z-20 backdrop-blur-sm">${item.rank}</div>` : ''}
        ${!item.soldOut ? (() => { const likes = getLikes(); const liked = likes[item.id]; return `
        <button class="heart-btn absolute top-3 right-3 z-20 flex items-center gap-1 cursor-pointer bg-black/30 backdrop-blur-sm rounded-full px-2 py-1.5 hover:bg-black/50 transition-colors" data-id="${item.id}" onclick="event.preventDefault();event.stopPropagation();toggleLike(${item.id})">
          <svg class="heart-icon w-5 h-5 transition-all duration-200" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:${liked ? '#ef4444' : 'rgba(255,255,255,0.7)'};fill:${liked ? '#ef4444' : 'none'};filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5));">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span class="heart-count text-white text-[12px] font-semibold" style="opacity:${liked ? '1' : '0'}">${liked ? '1' : ''}</span>
        </button>`; })() : ''}
        ${item.soldOut ? `
        <div class="absolute inset-0 flex items-center justify-center">
          <span class="px-5 py-2 rounded-full bg-red-500/90 text-white text-[13px] font-bold tracking-widest uppercase">FULL BOOKED</span>
        </div>` : `
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>`}
      </a>
      ${item.gallery && item.gallery.length > 1 && !item.soldOut ? `
      <div class="gallery-strip absolute bottom-0 left-0 right-0 z-10">
        <div class="gallery-carousel flex gap-1.5 px-2 pb-2 overflow-x-auto" style="scrollbar-width:none;-webkit-overflow-scrolling:touch;" data-card-id="${item.id}">
          ${item.gallery.map((img, i) => `
            <div class="gallery-thumb w-14 h-14 rounded-lg overflow-hidden bg-black/50 backdrop-blur-sm cursor-pointer shrink-0 ring-1 ring-white/10" data-gallery-idx="${i}" data-card-id="${item.id}">
              <img src="${img}" alt="" class="w-full h-full object-cover" loading="lazy">
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </div>

    <div class="p-5 flex flex-col flex-1 ${item.soldOut ? 'opacity-50' : ''}">
      ${badge ? `<div class="mb-2">${badge}</div>` : ''}

      <div class="mb-1.5">
        <h3 class="text-white text-[16px] font-semibold leading-tight mb-1">${item.name}</h3>
        <div class="flex items-center gap-1.5 text-[12px]">
          <i data-lucide="map-pin" class="w-3 h-3 text-white/30 shrink-0"></i>
          <span class="text-white/40">${item.location}</span>
          <span class="text-white/15 mx-0.5">/</span>
          <span class="${distanceColor(item.miles)}">${item.distance}</span>
        </div>
      </div>

      <div class="mb-2">
        <div class="flex items-baseline gap-1.5">
          <span class="text-white text-[22px] font-bold tracking-tight">${item.priceLow ? (item.priceLow === item.priceHigh ? `$${item.priceLow}` : `$${item.priceLow}–${item.priceHigh}`) : t('priceCheck')}</span>
          <span class="text-white/30 text-[12px]">${item.priceLow ? t('perNight') : ''}</span>
          ${item.specs ? `<span class="text-white/20 text-[12px]">|</span><span class="text-white/40 text-[11px]">${item.specs}</span>` : ''}
        </div>
        <p class="text-white/25 text-[11px]">${item.priceNote}</p>
      </div>

      <div class="flex flex-wrap gap-x-3 gap-y-1 text-[11px] mb-2">
        ${criteriaHTML}
      </div>

      <p class="text-white/50 text-[12px] leading-snug mb-3 mt-auto">${item.summary}</p>

      ${item.review ? `
      <div class="mb-3 px-3 py-2.5 rounded-[12px] bg-white/[0.03] border border-white/[0.06]">
        <div class="flex items-center gap-1 mb-1.5">
          <div class="flex items-center gap-0.5">
            ${[1,2,3,4,5].map(() => '<i data-lucide="star" class="w-2.5 h-2.5 text-amber-400 fill-amber-400"></i>').join('')}
          </div>
          <span class="text-amber-300 text-[11px] font-semibold">${item.review.rating}</span>
        </div>
        <p class="text-white/50 text-[11px] leading-snug italic mb-1.5">"${item.review.text}"</p>
        <p class="text-white/30 text-[10px]">${item.review.author} · ${item.review.location} · ${item.review.date}</p>
      </div>` : ''}

      <details>
        <summary class="flex items-center gap-1 text-white/25 text-[12px] cursor-pointer hover:text-white/40 transition-colors select-none py-1">
          <span>${t('detail')}</span>
          <i data-lucide="chevron-down" class="w-3.5 h-3.5 chevron-icon"></i>
        </summary>
        <div class="details-content mt-4 pt-4 border-t border-white/[0.06] space-y-5">
          <div>
            <p class="text-white/25 text-[10px] uppercase tracking-[0.1em] mb-2">${t('facility')}</p>
            <div class="flex flex-wrap gap-1.5">${amenityTags}</div>
          </div>
          <div>
            <p class="text-white/25 text-[10px] uppercase tracking-[0.1em] mb-2">${t('proLabel')}</p>
            <ul class="space-y-1.5">${prosHTML}</ul>
          </div>
          <div>
            <p class="text-white/25 text-[10px] uppercase tracking-[0.1em] mb-2">${t('conLabel')}</p>
            <ul class="space-y-1.5">${consHTML}</ul>
          </div>
          <div>
            <p class="text-white/25 text-[10px] uppercase tracking-[0.1em] mb-2">${t('search')}</p>
            <ul class="space-y-1">${searchHTML}</ul>
          </div>
          <p class="text-white/15 text-[11px]">${item.route}</p>
          <a href="${item.url}" target="_blank" rel="noopener noreferrer"
             class="inline-flex items-center gap-1.5 px-4 py-2 rounded-[12px] border border-white/[0.1] text-white/70 text-[12px] hover:bg-white/[0.05] hover:text-white/90 transition-colors cursor-pointer">
            <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
            ${t('viewLink')}
          </a>
        </div>
      </details>
    </div>
  </article>`;
}

// ── 언어 토글 ──
function toggleLang() {
  currentLang = currentLang === 'ko' ? 'en' : 'ko';
  renderApp();
  initMap();
  initCarousels();
  initGalleryClicks();
}

// ── 전체 렌더링 ──
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="max-w-[1600px] mx-auto px-5 md:px-8">

      <!-- Lang Toggle -->
      <div class="fixed top-5 right-5 z-50">
        <button id="langToggle" onclick="toggleLang()" class="px-4 py-2 rounded-full bg-white/10 backdrop-blur-md text-white/70 text-[13px] font-medium hover:bg-white/20 transition-colors border border-white/10">
          ${currentLang === 'ko' ? 'English' : '한국어'}
        </button>
      </div>

      <!-- Hero + Map -->
      <header class="pt-20 md:pt-28 pb-8">
        <div class="flex flex-col lg:flex-row lg:items-end lg:gap-10">
          <!-- 왼쪽: 타이틀 -->
          <div class="flex-1 min-w-0">

              <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
              <span class="text-amber-300/90 text-[13px] font-semibold tracking-wide">${t('subtitle')}</span>
            </div>
            <h1 class="text-[44px] md:text-[64px] font-bold text-white leading-[1.05] tracking-tight mb-6">${t('title1')}<br>${t('title2')}</h1>
            <p class="text-white/35 text-[15px] mb-6">${t('desc')}</p>
            <div class="flex flex-wrap gap-2 mb-8 lg:mb-0">
              ${t('tags').map(c =>
                `<span class="px-3.5 py-1.5 rounded-full bg-white/[0.06] text-white/50 text-[12px]">${c}</span>`
              ).join('')}
            </div>
          </div>
          <!-- 오른쪽: 지도 -->
          <div class="lg:flex-1 lg:min-w-[55%] shrink-0">
            <div class="flex items-center gap-2 mb-3">
              <span class="text-white/40 text-[12px] font-medium">${t('mapTitle')}</span>
              <span class="text-white/20 text-[11px]">${t('mapSub')}</span>
            </div>
            <div id="map" style="height:380px;border-radius:16px;z-index:0;"></div>
          </div>
        </div>
      </header>

      <!-- 숙소 목록 -->
      <section class="pt-8 pb-4">
        <div class="flex items-center gap-3 mb-8">
          <h2 class="text-white/80 text-[15px] font-semibold tracking-wide">${t('listTitle')}</h2>
          <span class="text-white/25 text-[12px]">${ACCOMMODATIONS.length}개</span>
          <div class="flex-1 h-px bg-white/[0.06]"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
          ${ACCOMMODATIONS.sort((a,b) => a.rank - b.rank).map(renderCard).join('')}
        </div>
      </section>

      <!-- Footer -->
      <footer class="pt-12 pb-20">
        <div class="flex items-start gap-2.5 px-5 py-4 rounded-[16px] bg-white/[0.03] border border-white/[0.06]">
          <i data-lucide="info" class="w-4 h-4 text-white/25 shrink-0 mt-0.5"></i>
          <p class="text-white/30 text-[13px] leading-relaxed">${t('footer')}</p>
        </div>
      </footer>

    </div>
  `;

  lucide.createIcons();
  initMap();
  initCarousels();
  initGalleryClicks();
}

function initMap() {
  const mapEl = document.getElementById('map');
  if (!mapEl) return;
  mapEl.innerHTML = '';
  mapEl._leaflet_id = null;

  const map = L.map('map', { scrollWheelZoom: false });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);

  // 모든 마커 좌표 수집 (fitBounds용)
  const homeLat = 38.88, homeLng = -77.10;
  const allPoints = [[homeLat, homeLng]];

  L.marker([homeLat, homeLng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:32px;height:32px;border-radius:50%;background:#3b82f6;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">🏠</div>',
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    })
  }).addTo(map).bindPopup(`<b>${t('home')}</b><br>Arlington, VA`);

  ACCOMMODATIONS.filter(a => a.lat && a.lng).forEach(a => {
    const bg = a.rank === 1 ? '#f59e0b' : '#ef4444';
    const textColor = a.rank === 1 ? '#000' : '#fff';
    allPoints.push([a.lat, a.lng]);
    L.marker([a.lat, a.lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="width:34px;height:34px;border-radius:50%;background:${bg};color:${textColor};font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);">${a.rank}</div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      })
    }).addTo(map).bindPopup(`<b>${a.rank}. ${a.name}</b><br>${a.location}<br>${a.distance} · $${a.priceLow}`);
  });

  // fitBounds로 모든 마커가 보이도록 자동 조정
  if (allPoints.length > 0) {
    map.fitBounds(allPoints, { padding: [30, 30], maxZoom: 9 });
  }
}

function initCarousels() {
  document.querySelectorAll('.gallery-carousel').forEach(carousel => {
    const items = carousel.innerHTML;
    carousel.innerHTML = items + items;
    let scrollInterval;
    const card = carousel.closest('.group');
    card.addEventListener('mouseenter', () => {
      scrollInterval = setInterval(() => {
        carousel.scrollLeft += 1;
        if (carousel.scrollLeft >= carousel.scrollWidth / 2) {
          carousel.scrollLeft = 0;
        }
      }, 25);
    });
    card.addEventListener('mouseleave', () => {
      clearInterval(scrollInterval);
      carousel.scrollLeft = 0;
    });
  });
}

function initGalleryClicks() {
  document.querySelectorAll('.gallery-thumb').forEach(thumb => {
    thumb.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const card = thumb.closest('article');
      const mainImg = card.querySelector('.gallery-main-img');
      const src = thumb.querySelector('img').src;
      mainImg.style.opacity = '0';
      setTimeout(() => {
        mainImg.src = src;
        mainImg.style.opacity = '1';
      }, 150);
    });
  });
}

renderApp();
</script>
